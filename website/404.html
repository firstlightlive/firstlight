<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0C10">
  <title>Page Not Found — FIRST LIGHT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Inter:wght@400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" type="image/png" href="/icon-512.png">
  <style>
    .not-found{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
    .nf-code{font-family:'Playfair Display',Georgia,serif;font-size:clamp(6rem,20vw,12rem);font-weight:900;color:var(--text);opacity:0.08;line-height:1;margin-bottom:-20px}
    .nf-title{font-family:'IBM Plex Mono',monospace;font-size:clamp(1rem,3vw,1.4rem);font-weight:700;letter-spacing:4px;color:var(--cyan);margin-bottom:16px}
    .nf-text{font-family:'Inter',sans-serif;font-size:15px;color:var(--text-muted);line-height:1.8;max-width:420px;margin-bottom:32px}
    .nf-ctas{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .nf-brand{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--text-dim);margin-top:48px}
  </style>
</head>
<body>
  <div class="not-found">
    <div class="nf-code">404</div>
    <div class="nf-title">PAGE NOT FOUND</div>
    <p class="nf-text">This page doesn't exist. But the streak does. Every morning. Before dawn. No exceptions.</p>
    <div class="nf-ctas">
      <a href="/" class="btn btn-primary">GO TO THE STREAK</a>
      <a href="/proof.html" class="btn btn-outline">SEE THE PROOF</a>
    </div>
    <div class="nf-brand">FIRST LIGHT</div>
  </div>
</body>
</html>
